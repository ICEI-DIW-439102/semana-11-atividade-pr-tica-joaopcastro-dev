<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - Cinefy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="cabecalho sticky-top">
    <div class="container-fluid">
        <div class="row align-items-center gy-2">
            <div class="col-auto">
                <a href="index.html" class="logo-link">
                    <img src="img/logo_branca.png" alt="Cinefy" class="imagem-logo">
                </a>
            </div>
            <div class="col-12 col-lg flex-grow-1">
                <form class="formulario-pesquisa">
                    <input type="text" class="campo-pesquisa w-100" placeholder="Pesquisar filmes e séries...">
                </form>
            </div>
            <div class="col-12 col-lg-auto">
                <nav class="menu-navegacao d-flex flex-wrap justify-content-center gap-2">
                </nav>
            </div>
        </div>
    </div>
</header>

<main class="conteudo-principal">
    <section class="container-lg">
        <div id="detalheContainer">
            <!-- Preenchido dinamicamente pelo app.js -->
        </div>
    </section>
</main>

<footer class="rodape mt-5">
    <div class="container-fluid">
        <p class="texto-rodape m-0">Cinefy 2026 - Todos os direitos reservados</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
